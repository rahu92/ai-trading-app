<!DOCTYPE html>
<html>
<head>
  <title>AI Trading System</title>

  <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 15px;
    }

    #chart {
      width: 95%;
      height: 400px;
      margin: auto;
    }

    .buttons {
      margin-top: 15px;
    }

    button {
      margin: 8px;
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      background: #22c55e;
      color: white;
      font-weight: bold;
    }

    #output {
      margin-top: 20px;
      font-size: 18px;
    }
  </style>
</head>

<body>

<h1>🚀 AI Trading System (PRO)</h1>

<div id="chart"></div>

<div class="buttons">
  <button onclick="getStrategy()">Strategy</button>
  <button onclick="runBacktest()">Backtest</button>
  <button onclick="getAI()">AI Signal</button>
</div>
<div style="margin-top:20px;">
  <h3>Strategy Builder</h3>

  <label><input type="checkbox" value="rsi"> RSI</label>
  <label><input type="checkbox" value="ema"> EMA</label>
  <label><input type="checkbox" value="macd"> MACD</label>
  <label><input type="checkbox" value="bb"> Bollinger</label>

  <br><br>

  <button onclick="runStrategy()">Generate Signal</button>
</div>
<div id="output"></div>

<script src="script.js"></script>

</body>
</html>
<style>
body {
  margin: 0;
  font-family: 'Segoe UI';
  background: #0b0f1a;
  color: #e2e8f0;
}

h1 {
  padding: 10px;
}

#chart {
  height: 400px;
  margin: 10px;
  border-radius: 10px;
  overflow: hidden;
}

.buttons {
  margin: 10px;
}

button {
  background: #1e293b;
  color: white;
  border: none;
  padding: 10px 15px;
  margin: 5px;
  border-radius: 6px;
  cursor: pointer;
}

button:hover {
  background: #22c55e;
}
</style>
