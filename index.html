<!DOCTYPE html>
<html>
<head>
  <title>AI Trading System</title>

  <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 15px;
    }

    #chart {
      width: 95%;
      height: 400px;
      margin: auto;
    }

    .buttons {
      margin-top: 15px;
    }

    button {
      margin: 8px;
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      background: #22c55e;
      color: white;
      font-weight: bold;
    }

    #output {
      margin-top: 20px;
      font-size: 18px;
    }
  </style>
</head>

<body>

<h1>🚀 AI Trading System (PRO)</h1>

<div id="chart"></div>

<div class="buttons">
  <button onclick="getStrategy()">Strategy</button>
  <button onclick="runBacktest()">Backtest</button>
  <button onclick="getAI()">AI Signal</button>
</div>

<div id="output"></div>

<script src="script.js"></script>

</body>
</html>
